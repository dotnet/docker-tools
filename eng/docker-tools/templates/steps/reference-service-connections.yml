# Emit AzureCLI@2 steps to explicitly reference service connections from
# publishConfig.RegistryAuthentication for the specified registries.
# This is required so that Azure DevOps will issue OIDC tokens for these
# service connections when requested from the current stage.
#
# This is the per-job equivalent of setup-service-connections.yml (which
# operates at the stage level).
parameters:
- name: publishConfig
  type: object
- name: usesRegistries
  type: object
  default: []
- name: dockerClientOS
  type: string
  default: linux

steps:
- ${{ each auth in parameters.publishConfig.RegistryAuthentication }}:
  - ${{ if containsValue(parameters.usesRegistries, auth.server) }}:
    - task: AzureCLI@2
      displayName: Reference ${{ auth.serviceConnection.name }}
      inputs:
        azureSubscription: ${{ auth.serviceConnection.name }}
        ${{ if eq(parameters.dockerClientOS, 'windows') }}:
          scriptType: ps
        ${{ else }}:
          scriptType: pscore
        scriptLocation: inlineScript
        inlineScript: Write-Host "Service connection referenced for OIDC"
