parameters:
  matrixType: null
  name: null
  pool: {}
  customBuildLegGroupArgs: ""
  isTestStage: false
  internalProjectName: null
  noCache: false
  publishConfig: null
  # Custom steps to set up ImageBuilder instead of pulling from MCR (e.g., bootstrap from source).
  # Runs before ImageBuilder pull. If non-empty, skips the default ImageBuilder pull.
  customInitSteps: []
  # Custom steps that run after ImageBuilder is set up but before matrix generation runs.
  customGenerateMatrixInitSteps: []
  versionsRepoRef: ""
  sourceBuildPipelineRunId: ""

jobs:
- job: ${{ parameters.name }}
  pool: ${{ parameters.pool }}
  steps:
  - template: /eng/docker-tools/templates/steps/init-common.yml@self
    parameters:
      dockerClientOS: linux
      publishConfig: ${{ parameters.publishConfig }}
      versionsRepoRef: ${{ parameters.versionsRepoRef }}
      customInitSteps: ${{ parameters.customInitSteps }}
  # When --trim-cached-images is active, ImageBuilder checks base image digests
  # in the ACR mirror registry. OCI image-info source additionally pulls from
  # the publish registry. Both require OIDC auth via service connections.
  - template: /eng/docker-tools/templates/steps/reference-service-connections.yml@self
    parameters:
      publishConfig: ${{ parameters.publishConfig }}
      internalProjectName: ${{ parameters.internalProjectName }}
      usesRegistries:
      - ${{ parameters.publishConfig.BuildRegistry.server }}
      - ${{ parameters.publishConfig.PublishRegistry.server }}
  - ${{ parameters.customGenerateMatrixInitSteps }}
  - template: /eng/docker-tools/templates/steps/retain-build.yml@self
  - template: /eng/docker-tools/templates/steps/validate-branch.yml@self
    parameters:
      publishConfig: ${{ parameters.publishConfig }}
      internalProjectName: ${{ parameters.internalProjectName }}
  - template: /eng/docker-tools/templates/steps/set-image-info-path-var.yml
    parameters:
      publicSourceBranch: $(publicSourceBranch)
  - ${{ if eq(parameters.isTestStage, true) }}:
    - template: /eng/docker-tools/templates/steps/download-build-artifact.yml@self
      parameters:
        targetPath: $(Build.ArtifactStagingDirectory)
        artifactName: image-info
        pipelineRunId: ${{ parameters.sourceBuildPipelineRunId }}
  - powershell: |
      $additionalGenerateBuildMatrixOptions = "$(additionalGenerateBuildMatrixOptions)"

      if ("${{ parameters.isTestStage}}" -eq "true") {
        $additionalGenerateBuildMatrixOptions = "$additionalGenerateBuildMatrixOptions --image-info $(artifactsPath)/image-info.json"
      }
      elseif ("$(pipelineDisabledCache)" -ne "true" `
          -and "${{ parameters.noCache }}" -ne "true" `
          -and "$(trimCachedImagesForMatrix)" -eq "true" `
          -and "$(System.TeamProject)" -eq "${{ parameters.internalProjectName }}" `
          -and "$(Build.Reason)" -ne "PullRequest") {
        # OCI image-info artifacts are pulled from the private publish registry, so cache trimming is only enabled
        # in jobs that run ImageBuilder with OIDC service connection auth.
        $additionalGenerateBuildMatrixOptions = "$additionalGenerateBuildMatrixOptions --image-info-registry-override ${{ parameters.publishConfig.PublishRegistry.server }} --image-info-repo-prefix ${{ parameters.publishConfig.PublishRegistry.repoPrefix }} --trim-cached-images"
      }

      echo "##vso[task.setvariable variable=additionalGenerateBuildMatrixOptions]$additionalGenerateBuildMatrixOptions"
    displayName: Set GenerateBuildMatrix Variables
  - script: >
      echo "##vso[task.setvariable variable=generateBuildMatrixCommand]
      generateBuildMatrix
      --manifest $(manifest)
      --type ${{ parameters.matrixType }}
      --os-type '*'
      --architecture '*'
      --product-version-components $(productVersionComponents)
      ${{ parameters.customBuildLegGroupArgs }}
      $(imageBuilder.pathArgs)
      $(manifestVariables)
      $(commonMatrixAndBuildOptions)
      $(additionalGenerateBuildMatrixOptions)"
    displayName: Set GenerateBuildMatrix Command
  - template: /eng/docker-tools/templates/steps/run-imagebuilder.yml@self
    parameters:
      name: matrix
      displayName: Generate ${{ parameters.matrixType }} Matrix
      internalProjectName: internal
      args: $(generateBuildMatrixCommand)
