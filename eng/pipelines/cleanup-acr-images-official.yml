trigger: none
pr: none

schedules:
- cron: "0 5 * * *"
  displayName: Nightly build
  branches:
    include:
    - main
  always: true

parameters:
- name: enableDryRun
  displayName: Enable Dry Run
  default: false
  type: boolean

variables:
- template: /eng/pipelines/templates/variables/common.yml@self
# Temporarily disabled due to https://github.com/dotnet/docker-tools/issues/2056.
- name: publishEolAnnotations
  value: false
  readonly: true

extends:
  template: /eng/docker-tools/templates/1es-official.yml@self
  parameters:
    stages:
    - template: /eng/docker-tools/templates/stages/dotnet/publish-config-prod.yml@self
      parameters:
        stagesTemplate: /eng/pipelines/templates/stages/cleanup-acr-images.yml@self
        stagesTemplateParameters:
          enableDryRun: ${{ parameters.enableDryRun }}
